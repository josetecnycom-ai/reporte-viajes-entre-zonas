<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reporte de Trayectos</title>
    <script src="https://cdn.jsdelivr.net/npm/mg-api-js"></script>
    <style>
        .container { padding: 20px; font-family: Arial; }
        .filter-group { margin-bottom: 15px; }
        .kpi-container { display: flex; gap: 10px; margin-top: 20px; }
        .kpi-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; flex: 1; text-align: center; background: #f9f9f9; }
        .btn-export { background: #2c3e50; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Control de Viajes entre Zonas</h2>
        
        <div class="filter-group">
            <label>Grupo:</label>
            <select id="groupSelect"><option>Cargando grupos...</option></select>
        </div>

        <div class="filter-group">
            <label>Vehículos:</label>
            <select id="deviceSelect" multiple size="4"></select>
        </div>

        <div class="filter-group">
            <label>Zona Origen / Destino:</label>
            <select id="zoneStart"></select>
            <select id="zoneEnd"></select>
        </div>

        <div class="kpi-container">
            <div class="kpi-card"><strong>Viajes Hoy</strong><div id="kpiTotal">0</div></div>
            <div class="kpi-card"><strong>Tiempos Ruta</strong><div id="kpiAvgTime">0 min</div></div>
            <div class="kpi-card"><strong>Espera Aerop.</strong><div id="kpiWait">0 min</div></div>
        </div>

        <button class="btn-export" id="exportBtn">Descargar Reporte Ejecutivo (Excel)</button>
    </div>

    <script src="app.js"></script>
</body>
</html>

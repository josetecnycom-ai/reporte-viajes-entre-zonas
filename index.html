<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reporte de Trayectos v1.1.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .geotab-addin-content { padding: 20px; font-family: sans-serif; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #eee; padding: 15px; border-radius: 8px; }
        .filter-item { display: flex; flex-direction: column; gap: 5px; }
        select { padding: 5px; min-height: 30px; }
        select[multiple] { height: 80px; }
        .controls { margin-top: 15px; display: flex; gap: 10px; }
        #tableContainer { margin-top: 20px; overflow-x: auto; }
        .results-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .results-table th { background: #2c3e50; color: white; padding: 10px; text-align: left; }
        .results-table td { padding: 8px; border-bottom: 1px solid #ddd; }
        .version { color: #999; font-size: 11px; float: right; }
    </style>
</head>
<body class="geotab-addin">
    <div id="reporte-lanzadera" class="geotab-addin-content">
        <span class="version">v1.1.2</span>
        <h2>Analizador de Trayectos</h2>
        
        <div class="filter-grid">
            <div class="filter-item">
                <label>Desde / Hasta:</label>
                <input type="datetime-local" id="dateFrom">
                <input type="datetime-local" id="dateTo">
            </div>
            <div class="filter-item">
                <label>Grupos:</label>
                <select id="groupSelect" multiple></select>
            </div>
            <div class="filter-item">
                <label>Vehículos:</label>
                <select id="deviceSelect" multiple></select>
            </div>
            <div class="filter-item">
                <label>Zonas A y B:</label>
                <select id="zoneA"></select>
                <select id="zoneB"></select>
            </div>
        </div>

        <div class="controls">
            <button id="btnGenerar" style="padding:10px 20px; background:#0078d4; color:white; border:none;">Generar Informe</button>
            <button id="btnExportar" style="padding:10px 20px; background:#107c10; color:white; border:none;">Descargar Excel</button>
        </div>

        <div id="tableContainer"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
